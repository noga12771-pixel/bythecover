    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Arbel', sans-serif;
      background: var(--cream);
      color: var(--black);
    }

    /* ─── Screens ─── */
    .screen {
      display: none;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      padding: 60px 40px;
      box-sizing: border-box;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeUp .6s ease both;
    }
    .screen.active { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Progress ─── */
    #progress {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      font-size: 13px;
      letter-spacing: 3px;
      opacity: .5;
      direction: ltr;
    }

    /* ─── Buttons ─── */
    .btn {
      background: var(--black);
      color: var(--cream);
      border: 1.5px solid var(--black);
      padding: 13px 22px;
      font-family: var(--font);
      font-size: 13px;
      letter-spacing: 3px;
      border-radius: 0;
      cursor: pointer;
      transition: all .25s;
    }
    .btn:hover { background: transparent; color: var(--black); }
    .btn.inv { background: var(--cream); color: var(--black); border-color: var(--cream); }
    .btn.inv:hover { background: transparent; color: var(--cream); }
    .btn:disabled { opacity: .28; pointer-events: none; }

    /* ─── Screen 1: Opening ─── */
    #s1 { background: var(--cream); position: relative; overflow: hidden; }
    #s1 .sub {
      color: var(--black);
      font-size: 11px;
      letter-spacing: 5px;
      opacity: .5;
      margin-bottom: 56px;
      position: relative;
      z-index: 1;
    }
    #s1 #logo-svg { position: relative; z-index: 1; }
    #s1 .btn { position: relative; z-index: 1; margin-top: -60px; border-radius: 0; }

    /* ─── Scattered opening icons ─── */
    .intro-icons { position: absolute; inset: 0; pointer-events: none; }
    .intro-icon {
      position: absolute;
      pointer-events: all;
      cursor: default;
    }
    .intro-icon img {
      width: 100%;
      height: 100%;
      pointer-events: all;
      object-fit: contain;
      opacity: 1;
      filter: brightness(0);
      transition: filter 0.3s ease, opacity 0.3s ease;
      transform: scale(0.95);
      transform-origin: center;
    }

    /* ─── Logo SVG ─── */
    #logo-svg {
      width: 400px;
      max-width: 80vw;
      margin-bottom: 24px;
    }

    /* ─── Screen 2: Name ─── */
    .q { font-size: 24px; font-weight: 300; letter-spacing: 4px; margin-bottom: 48px; text-align: center; font-family: 'Masada', serif; }
    #s2 .q { font-size: 32px; }
    #name-bg-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 35vw;
      font-family: 'Masada', serif;
      color: #111;
      opacity: 0.06;
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      user-select: none;
    }
    #name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--black);
      font-family: 'Arbel', sans-serif;
      font-weight: 400;
      font-style: normal;
      font-size: 38px;
      color: var(--black);
      width: 380px;
      max-width: 80vw;
      padding: 8px 4px;
      text-align: center;
      outline: none;
      margin-bottom: 56px;
      direction: rtl;
    }
    #name-input::placeholder { opacity: .25; font-size: 24px; }

    /* ─── Screen 3: Sliders ─── */
    #s3 { transition: background 0.5s ease, color 0.5s ease; }
    #s3 .q { font-size: 32px; margin-bottom: 43px; }
    #s3 .sliders-wrap { width: 835px; margin-bottom: 53px; }
    #s3 .slider-row { gap: 20px; margin-bottom: 29px; }
    #s3 .sl-lbl { font-size: 17px; min-width: 103px; }
    #s3 input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 24px;
      background: linear-gradient(to bottom,
        transparent calc(50% - 0.5px),
        var(--black) calc(50% - 0.5px),
        var(--black) calc(50% + 0.5px),
        transparent calc(50% + 0.5px)
      );
      cursor: pointer;
      outline: none;
    }
    #s3 input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 19px; height: 19px;
      border-radius: 0;
      background: var(--s3-fg, var(--black));
      cursor: pointer;
    }
    #s3 input[type=range]::-moz-range-thumb {
      width: 19px; height: 19px;
      border-radius: 0;
      background: var(--s3-fg, var(--black));
      border: none;
      cursor: pointer;
    }
    #s3 input[type=range]::-moz-range-track { height: 1px; background: var(--s3-fg, var(--black)); border: none; }
    #s3 input[type=range]::-moz-range-progress { height: 1px; background: var(--s3-fg, var(--black)); }
    .sliders-wrap { width: 580px; max-width: 90vw; margin-bottom: 44px; }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .sl-lbl {
      font-size: 12px;
      letter-spacing: 1px;
      min-width: 72px;
      text-align: center;
      opacity: .7;
    }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 24px;
      background: transparent;
      outline: none;
      direction: ltr;
      padding: 0;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 1px;
      background: var(--black);
    }
    input[type=range]::-moz-range-track {
      height: 1px;
      background: var(--black);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      margin-top: -6px;
      border-radius: 0;
      background: var(--black);
      cursor: pointer;
      transition: transform .2s;
    }
    input[type=range]::-moz-range-thumb {
      width: 13px; height: 13px;
      border-radius: 0;
      background: var(--black);
      cursor: pointer;
      border: none;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }

    /* Screen 3 — white cursor injected by JS */

    /* ─── Screen 4: Genre Columns ─── */
    #s4 {
      padding: 0 !important;
      justify-content: flex-start;
      gap: 0;
    }
    .genre-columns {
      display: flex;
      width: 100%;
      height: 88vh;
      min-height: 440px;
      position: relative;
    }
    .genre-col {
      flex: 1;
      background: linear-gradient(to right,
        #010100 0%,
        #110e08 8%,
        #1e180f 25%,
        #221c12 50%,
        #1e180f 75%,
        #110e08 92%,
        #010100 100%
      );
      box-shadow: inset 6px 0 18px rgba(0,0,0,0.75), inset -6px 0 18px rgba(0,0,0,0.75), inset 0 0 40px rgba(0,0,0,0.3),
                  -6px 0 12px rgba(0,0,0,0.55), 6px 0 12px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 22px;
      cursor: pointer;
      transition: flex 0.55s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      position: relative;
    }
    .genre-col::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to left, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
      z-index: 3;
      pointer-events: none;
    }
    .genre-col:first-child::before { display: none; }
    .genre-col::after {
      content: "";
      position: absolute;
      top: 8%;
      right: 3px;
      width: 1px;
      height: 84%;
      background: linear-gradient(to bottom, transparent, rgba(255,220,140,0.10) 30%, rgba(255,220,140,0.10) 70%, transparent);
      pointer-events: none;
      z-index: 1;
    }
    .genre-col:hover, .genre-col.sel { flex: 3.5; }
    .genre-col-name {
      color: #FFFAF1;
      font-size: 33.75px;
      letter-spacing: 4px;
      white-space: nowrap;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%) translateY(-50%) rotate(-90deg);
      z-index: 2;
      opacity: 1;
      transition: opacity 0.3s, transform 0.4s ease, top 0.4s ease;
    }
    .genre-col:hover .genre-col-name,
    .genre-col.sel .genre-col-name {
      opacity: 1;
      transform: translateX(-50%) translateY(0) rotate(0deg);
      top: 22px;
    }
    .genre-imgs {
      position: absolute;
      top: 71px;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }
    .genre-img {
      position: absolute;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .genre-img img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0) invert(1) sepia(8%) saturate(300%) hue-rotate(10deg);
    }
    .genre-col:hover .genre-img:nth-child(1),
    .genre-col.sel .genre-img:nth-child(1) { opacity: 1; transition-delay: 0.05s; }
    .genre-col:hover .genre-img:nth-child(2),
    .genre-col.sel .genre-img:nth-child(2) { opacity: 1; transition-delay: 0.12s; }
    .genre-col:hover .genre-img:nth-child(3),

      cursor: pointer;
      transition: transform .22s cubic-bezier(.4,0,.2,1), filter .22s;

      content: '';
      position: absolute;
      left: 100%; top: 2px; bottom: 2px;
      width: 12px;
      background: var(--lib-spine, linear-gradient(to right, #080808 0%, #242424 55%, #111 100%));
      border-radius: 0 3px 3px 0;
      box-shadow: 3px 0 6px rgba(0,0,0,.38);

    .lib-book:hover {
      transform: translateY(-10px) scale(1.05);
      filter: drop-shadow(0 14px 22px rgba(0,0,0,.42));
    }
    /* inner face — clips SVG + depth overlay */
    .lib-book-face {
      width: 100%; height: 100%;
      border-radius: 4px 2px 2px 4px;
      overflow: hidden;
      position: relative;
      box-shadow: 3px 5px 18px rgba(0,0,0,.32);
    }
    /* depth / gloss overlay */
    .lib-book-face::after {
      content: '';

// ═══════════════════════════════════════════════
// INTRO ICON HOVER — CSS filter
// ═══════════════════════════════════════════════
// INTRO ICON HOVER
// ═══════════════════════════════════════════════
(function() {
  var imgs = Array.from(document.querySelectorAll('.intro-icon img'));
  var hovered = null;
  document.addEventListener('mousemove', function(e) {
    var found = null;
    for (var i = 0; i < imgs.length; i++) {
      var r = imgs[i].getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
        found = imgs[i];
        break;
      }
    }
    if (found !== hovered) {
      if (hovered) hovered.style.filter = '';
      if (found) {
        var hue = Math.floor(Math.random() * 360);
        var sat = (Math.random() * 9 + 4).toFixed(1);
        var bri = (Math.random() * 0.25 + 0.7).toFixed(2);
        var con = (Math.random() * 0.4 + 0.9).toFixed(2);
        found.style.filter = 'invert(1) sepia(1) saturate(' + sat + ') hue-rotate(' + hue + 'deg) brightness(' + bri + ') contrast(' + con + ')';
      }
      hovered = found;
    }
  });
})();

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function resetAndGoHome() {
  state.name = '';
  state.sliders = [3,3,3,3,3,3,3];
  state.genre = null;
  state.color = null;
  state.image = null;
  state.imageKey = null;
  state.composition = null; state.compositionLocked = false;
  state.typography = null;
  state.summary = '';
  state.bookTitle = '';
  state.scores = { emotion:0, logic:0, intro:0, extro:0, order:0, chaos:0, connect:0, indep:0 };
  // reset UI elements
  const nameInput = document.getElementById('name-input');
  if (nameInput) nameInput.value = '';
  const nameBgText = document.getElementById('name-bg-text');
  if (nameBgText) nameBgText.textContent = '';
  const nameBtn = document.getElementById('name-btn'); if (nameBtn) nameBtn.disabled = true;
  document.querySelectorAll('.genre-col').forEach(c => c.classList.remove('sel'));
  const genreBtn = document.getElementById('genre-btn'); if (genreBtn) genreBtn.disabled = true;
  document.querySelectorAll('.alpha-cell.sel').forEach(c => c.classList.remove('sel'));
  document.querySelectorAll('.alpha-col.col-hovered').forEach(c => c.classList.remove('col-hovered'));
  const fontBtn = document.getElementById('font-btn');
  if (fontBtn) fontBtn.disabled = true;
  document.querySelectorAll('#sliders-wrap input[type=range]').forEach((r,i) => { r.value = 3; state.sliders[i] = 3; });
  updateS3Bg();
  go(1);
}

function go(n) {
  if (state.screen === 10 && n !== 10) stopLibParallax();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  state.screen = n;
  updateProgress();
  syncPreviews();
  if (n === 3) updateS3Bg();
  if (n === 5) populateImageBooks();
  if (n === 9) { if (!state.bookTitle) triggerReveal(); else syncPreviews(); }
  if (n === 10) { libZoom = 1; libTX = 0; libTY = 0; renderLibrary(); }
  window.scrollTo(0,0);
}

function updateProgress() {
  const prog = document.getElementById('progress');
  prog.style.display = (state.screen === 1 || state.screen === 9) ? 'none' : 'block';
  prog.style.color = 'var(--black)';
  prog.style.textShadow = 'none';
  prog.textContent = state.screen + ' / 10';
}

// SCREEN 3 — Slider background
// ═══════════════════════════════════════════════
function updateS3Bg() {
  const avg = state.sliders.reduce((a, b) => a + b, 0) / state.sliders.length;
  let r, g, b;
  if (avg <= 3) {
    const t = (avg - 1) / 2;
    r = Math.round(0x1A + (0xFF - 0x1A) * t);
    g = Math.round(0x1A + (0xFA - 0x1A) * t);
    b = Math.round(0x2E + (0xF1 - 0x2E) * t);
  } else {
    const t = (avg - 3) / 2;
    r = Math.round(0xFF + (0xC8 - 0xFF) * t);
    g = Math.round(0xFA + (0x86 - 0xFA) * t);
    b = Math.round(0xF1 + (0x0A - 0xF1) * t);
  }
  // Luminance-based contrast: always pick cream or dark for maximum readability
  const lum = 0.299 * r + 0.587 * g + 0.114 * b;
  const fgColor = lum > 140 ? '#231f20' : '#FFFAF1';
  const s3 = document.getElementById('s3');
  s3.style.background = `rgb(${r},${g},${b})`;
  s3.style.color = fgColor;
  s3.style.setProperty('--s3-fg', fgColor);
  // Update slider track + thumb color
  s3.querySelectorAll('input[type=range]').forEach(inp => {
    inp.style.background = `linear-gradient(to bottom,
      transparent calc(50% - 0.5px),
      ${fgColor} calc(50% - 0.5px),
      ${fgColor} calc(50% + 0.5px),
      transparent calc(50% + 0.5px))`;
  });
  // Store fg for particles
  s3._fgColor = fgColor;
  s3.classList.toggle('dark-bg', lum <= 140);
}

(function buildSliders() {
  const wrap = document.getElementById('sliders-wrap');
  SLIDERS.forEach(([right, left], i) => {
    const row = document.createElement('div');
    row.className = 'slider-row';
    row.innerHTML = `
      <span class="sl-lbl" style="text-align:right">${right}</span>
      <input type="range" min="1" max="5" value="3" id="sl${i}">
      <span class="sl-lbl" style="text-align:left">${left}</span>
    `;
    row.querySelector('input').addEventListener('input', function() {
      state.sliders[i] = +this.value;
      updateS3Bg();
    });
    wrap.appendChild(row);
  });
})();

// Screen 3 — pixel particle effect on mousemove
(function() {
  const s3 = document.getElementById('s3');
  let lastX = -99, lastY = -99, throttle = false;

  s3.addEventListener('mousemove', function(e) {
    if (throttle) return;
    throttle = true;
    requestAnimationFrame(() => { throttle = false; });

    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    if (Math.abs(dx) + Math.abs(dy) < 4) return;
    lastX = e.clientX; lastY = e.clientY;

    const count = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const px = document.createElement('div');
      const size = 2 + Math.floor(Math.random() * 4);
      const vx = (Math.random() - 0.5) * 60;
      const vy = (Math.random() - 0.8) * 60;
      const dur = 400 + Math.random() * 400;
      Object.assign(px.style, {
        position: 'fixed',
        left: e.clientX + 'px',
        top:  e.clientY + 'px',
        width:  size + 'px',
        height: size + 'px',
        background: document.getElementById('s3')._fgColor || '#231f20',
        pointerEvents: 'none',
        zIndex: 9999,
        opacity: '0.7',
        transition: `transform ${dur}ms linear, opacity ${dur}ms ease`,
        transform: 'translate(0,0)',
      });
      document.body.appendChild(px);
      requestAnimationFrame(() => {
        px.style.transform = `translate(${vx}px, ${vy}px)`;
        px.style.opacity = '0';
      });
      setTimeout(() => px.remove(), dur + 50);
    }
  });
})();

function selectGenreCol(el, name) {
  document.querySelectorAll('.genre-col').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  state.genre = name;
  document.getElementById('genre-btn').disabled = false;
}

function scatterGenreImages(col) {
  const allImgs = Array.from(col.querySelectorAll('.genre-img'));
  const prevShown = col._prevShown || [];
  // Pick 5 out of 8, guaranteeing at least 3 are different from last time
  let imgs;
  let attempts = 0;
  do {
    const shuffled = allImgs.slice().sort(() => Math.random() - 0.5);
    imgs = shuffled.slice(0, 5);
    attempts++;
  } while (attempts < 20 && imgs.filter(img => !prevShown.includes(img)).length < 3);
  col._prevShown = imgs;

  const hidden = allImgs.filter(img => !imgs.includes(img));
  hidden.forEach(img => { img.style.opacity = '0'; img.style.pointerEvents = 'none'; });
  imgs.forEach(img => { img.style.opacity = ''; img.style.pointerEvents = ''; });

  const pad = 3;          // % gap from column edges
  const gap = 7;          // % min gap between images
  const placed = [];

  imgs.forEach(img => {
    // Random size: 14–22% of column width
    const w = 14 + Math.random() * 8;
    // Estimate height in %-space: images are roughly square-ish icons
    const h = w * 1.25;
    // Random gentle rotation
    const rot = (Math.random() - 0.5) * 20;

    const maxX = 100 - pad - w;
    const maxY = 100 - pad - h;

    let bestX = pad + Math.random() * (maxX - pad);
    let bestY = pad + Math.random() * (maxY - pad);
    let bestOverlap = Infinity;

    // Try 150 candidates, keep the one with least overlap
    for (let t = 0; t < 150; t++) {
      const tx = pad + Math.random() * (maxX - pad);
      const ty = pad + Math.random() * (maxY - pad);
      let totalOverlap = 0;
      placed.forEach(p => {
        const ox = Math.max(0, Math.min(tx + w + gap, p.x + p.w + gap) - Math.max(tx, p.x));
        const oy = Math.max(0, Math.min(ty + h + gap, p.y + p.h + gap) - Math.max(ty, p.y));
        totalOverlap += ox * oy;
      });
      if (totalOverlap < bestOverlap) {
        bestOverlap = totalOverlap;
        bestX = tx;
        bestY = ty;
        if (bestOverlap === 0) break;
      }
    }

    placed.push({ x: bestX, y: bestY, w, h });
    img.style.left   = bestX.toFixed(1) + '%';
    img.style.top    = bestY.toFixed(1) + '%';
    img.style.width  = w.toFixed(1) + '%';
    img.style.transform = `rotate(${rot.toFixed(1)}deg)`;
  });
}

document.querySelectorAll('.genre-col').forEach(col => {

function populateImageBooks() {
  const shelf = document.getElementById('books-shelf');
  if (!shelf) return;
  shelf.innerHTML = '';
  document.getElementById('img-btn').disabled = true;

  const cat = CATEGORIES.find(c => c.label === state.genre) || CATEGORIES[0];
  const images = cat.images;
  const n = images.length;
  const step = n > 1 ? 20 / (n - 1) : 0;

  shelf.style.setProperty('--genre-color', cat.color || 'transparent');

  // 8 positions in a 4+4 grid — spread to avoid overlaps
  const POSITIONS = [
    { l:'10%', t:'3%',  r:-20 },
    { l:'27%', t:'2%',  r: 13 },
    { l:'53%', t:'4%',  r:-9  },
    { l:'78%', t:'3%',  r:-5  },
    { l:'2%',  t:'52%', r: 18 },
    { l:'27%', t:'53%', r:-14 },
    { l:'53%', t:'51%', r: 8  },
    { l:'78%', t:'52%', r:-8  },
  ];

  images.forEach((img, i) => {
    const pos = POSITIONS[i % POSITIONS.length];
    const wrap = document.createElement('div');
    wrap.className = 'book-card-wrap';
    wrap.style.left = pos.l;
    wrap.style.top  = pos.t;
    wrap.style.setProperty('--rot', pos.r + 'deg');
    const el = document.createElement('div');
    el.className = 'book-card';
    el.innerHTML = `<div class="book-card-img"><img src="${img.svg}" alt="${img.key}"></div><div class="book-color-overlay"></div>`;
    wrap.appendChild(el);
    wrap.onclick = () => {
      document.querySelectorAll('.book-card-wrap').forEach(e => e.classList.remove('sel'));
      wrap.classList.add('sel');
      state.image = img;
      state.imageKey = img.key;
      document.getElementById('img-btn').disabled = false;
      updatePreview();
    };
    shelf.appendChild(wrap);
  });
}

// SCREEN 6 — Color Palettes
// ═══════════════════════════════════════════════
(function buildPalettes() {
  const wrap = document.getElementById('color-strips');
  if (!wrap) return;
  // flex-grow patterns per strip — uneven rectangle widths
  const FLEX_PATTERNS = [
    [3, 1, 4, 2, 1, 5, 2, 3, 1, 4, 2, 1],
    [1, 4, 2, 5, 1, 3, 2, 1, 4, 2, 5, 1],
    [4, 1, 2, 3, 5, 1, 3, 2, 1, 4, 1, 3],
    [2, 5, 1, 3, 2, 4, 1, 2, 5, 1, 3, 2],
    [1, 3, 5, 2, 1, 4, 3, 1, 2, 5, 1, 4],
  ];
  const QUESTION_WORDS = ['איזו', 'צבעוניות', 'מעניינת', 'אותך', 'יותר?'];
  const WORD_RIGHT    = ['40px', '40px', '40px', '240px', '240px'];
  PALETTES.forEach((pal, palIdx) => {
    const strip = document.createElement('div');
    strip.className = 'color-strip';
    // repeat the palette colors 3 times across the full width
    const repeated = [...pal.colors, ...pal.colors, ...pal.colors];
    const flexes = FLEX_PATTERNS[palIdx % FLEX_PATTERNS.length];
    repeated.forEach((c, i) => {
      const sw = document.createElement('div');
      sw.className = 'strip-swatch';
      sw.style.background = c;
      sw.style.flex = flexes[i] + ' 0 0';
      strip.appendChild(sw);
    });
    strip.onclick = () => {
      document.querySelectorAll('.color-strip').forEach(e => e.classList.remove('sel'));
      strip.classList.add('sel');
      state.color = pal;
      document.getElementById('color-btn').disabled = false;
      updatePreview();
      _previewPalette(pal);
    };
    strip.addEventListener('mouseenter', () => { if (!state.color) _previewPalette(pal); });
    strip.addEventListener('mouseleave', () => { if (!state.color) _previewPalette(null); });
    // word label on this strip
    const word = document.createElement('div');
    word.className = 'strip-word';
    word.textContent = QUESTION_WORDS[palIdx] || '';
    word.style.color = pal.textColor;
    word.style.right = WORD_RIGHT[palIdx];
    strip.appendChild(word);
    wrap.appendChild(strip);
  });
})();

function _previewPalette(pal) {
  const el = document.getElementById('cover-preview-2');
  if (!el) return;
  const bg     = pal ? pal.colors[0] : '#111111';
  const accent = pal ? pal.colors[2] : null;
  const fg     = pal ? pal.textColor : '#FFFAF1';
  const spineColor = pal ? pal.colors[1] : null;
  const bookWrap = document.getElementById('s6-book-wrap');
  if (bookWrap) {
    bookWrap.style.setProperty('--spine-bg', spineColor
      ? `linear-gradient(to right, color-mix(in srgb, ${spineColor} 50%, #000) 0%, ${spineColor} 45%, color-mix(in srgb, ${spineColor} 70%, #000) 100%)`
      : 'linear-gradient(to right, #0d0d0d 0%, #2a2a2a 60%, #111 100%)');
  }
  el.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 160 240">
    <defs><style>.ff{font-family:'Heebo',sans-serif}</style></defs>
    ${buildCoverSVG(160, 240, bg, accent, state.image?.svg ?? null, state.name || '', state.typography, fg, state.composition, getPalImgTint(pal), undefined, pal?.nameColor)}
  </svg>`;
}

function _s7BookSVG(comp, w, h) {
  w = w || 160; h = h || 240;
  const bg     = state.color ? state.color.colors[0] : '#111111';
  const accent = state.color ? state.color.colors[2] : null;
  const fg     = state.color ? state.color.textColor : '#FFFAF1';
  const imgSvg = state.image ? state.image.svg : null;
  const font   = state.typography || null;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 ${w} ${h}">
    <defs><style>.ff{font-family:'Heebo',sans-serif}</style></defs>
    ${buildCoverSVG(w, h, bg, accent, imgSvg, state.name || '', font, fg, comp, getPalImgTint(state.color), undefined, state.color?.nameColor)}
  </svg>`;
}

function _buildS7Shelf() {
  const shelf = document.getElementById('s7-shelf');
  if (!shelf) return;
  shelf.innerHTML = '';

  const spineColor = state.color ? state.color.colors[1] : null;
  const spineGrad  = spineColor
    ? `linear-gradient(to right,color-mix(in srgb,${spineColor} 50%,#000) 0%,${spineColor} 45%,color-mix(in srgb,${spineColor} 70%,#000) 100%)`
    : 'linear-gradient(to right,#0d0d0d 0%,#2a2a2a 60%,#111 100%)';

  const bookWrap = document.createElement('div');
  bookWrap.id = 's7-book-wrap';
  bookWrap.className = 'book-wrap';
  bookWrap.style.setProperty('--spine-bg', spineGrad);

  const bigCover = document.createElement('div');
  bigCover.id = 's7-big-cover';
  const activComp = state.composition || COMPOSITIONS[0];
  bigCover.innerHTML = _s7BookSVG(activComp, 300, 450);
  bookWrap.appendChild(bigCover);
  let compositionChosen = !!state.compositionLocked;
  shelf.appendChild(bookWrap);

  // Rebuild or clear the labels row
  let labelsRow = document.getElementById('s7-labels');
  if (!labelsRow) {
    labelsRow = document.createElement('div');
    labelsRow.id = 's7-labels';
    labelsRow.className = 's7-labels';
    shelf.parentNode.insertBefore(labelsRow, shelf.nextSibling);
  }
  labelsRow.innerHTML = '';

  if (!state.composition) {
    state.composition = COMPOSITIONS[0];
    document.getElementById('comp-btn').disabled = false;
  }
  const selKey = state.composition.key;
  const btnList = [];

  COMPOSITIONS.forEach((comp) => {
    const btn = document.createElement('button');
    btn.className = 's7-lbl-btn' + (comp.key === selKey ? ' sel' : '');
    btn.textContent = comp.label;
    btnList.push(btn);

    btn.addEventListener('mouseenter', () => {
      if (!compositionChosen) bigCover.innerHTML = _s7BookSVG(comp, 300, 450);
    });
    btn.addEventListener('mouseleave', () => {
      if (!compositionChosen) bigCover.innerHTML = _s7BookSVG(activComp, 300, 450);
    });
    btn.addEventListener('click', () => {
      btnList.forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      state.composition = comp;
      state.compositionLocked = true;
      compositionChosen = true;
      bigCover.innerHTML = _s7BookSVG(comp, 300, 450);
      document.getElementById('comp-btn').disabled = false;
      updatePreview();
    });

    labelsRow.appendChild(btn);
  });
}

function miniCover(w, h, comp, i) {

  const type = i;

    case 0: return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#f0ede6"/>${svgId?`<image href="${svgId}" x="${w*.25}" y="${h*.2}" width="${w*.5}" height="${w*.5}" opacity=".8"/>`:''}<rect x="${w*.2}" y="${h*.75}" width="${w*.6}" height="2" fill="${fg}" opacity=".3"/><rect x="${w*.25}" y="${h*.82}" width="${w*.5}" height="1.5" fill="${fg}" opacity=".2"/></svg>`;
    case 1: return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#f0ede6"/>${svgId?`<image href="${svgId}" x="${w*.58}" y="${h*.06}" width="${w*.3}" height="${w*.3}" opacity=".8"/>`:''}<rect x="${w*.12}" y="${h*.45}" width="${w*.76}" height="2" fill="${fg}" opacity=".5"/><rect x="${w*.12}" y="${h*.55}" width="${w*.6}" height="1.5" fill="${fg}" opacity=".3"/><rect x="${w*.12}" y="${h*.63}" width="${w*.7}" height="1.5" fill="${fg}" opacity=".3"/></svg>`;
    case 2: return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#f0ede6"/>${svgId?`<image href="${svgId}" x="${w*.05}" y="${h*.05}" width="${w*.9}" height="${h*.9}" opacity=".7"/>`:''}</svg>`;
    case 3: return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#f0ede6"/>${svgId?`<image href="${svgId}" x="${w*.02}" y="${h*.1}" width="${w*.46}" height="${h*.8}" opacity=".8"/>`:''}<rect x="${w*.55}" y="${h*.42}" width="${w*.38}" height="2" fill="${fg}" opacity=".4"/><rect x="${w*.55}" y="${h*.52}" width="${w*.3}" height="1.5" fill="${fg}" opacity=".25"/></svg>`;
    case 4: return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="${w}" height="${h}" fill="#f0ede6"/>${svgId?`<image href="${svgId}" x="${w*.38}" y="${h*.06}" width="${w*.5}" height="${w*.5}" opacity=".7" transform="rotate(-12,${w*.63},${h*.25})"/><image href="${svgId}" x="${w*.04}" y="${h*.5}" width="${w*.3}" height="${w*.3}" opacity=".5"/>`:''}<rect x="${w*.12}" y="${h*.82}" width="${w*.4}" height="1.5" fill="${fg}" opacity=".35"/></svg>`;
  }
  return '';
}

(function buildFonts() {
  const HEBREW = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');
  const grid = document.getElementById('font-grid');
  if (!grid) return;
  grid.innerHTML = '';

  const titleEl = document.createElement('div');
  titleEl.className = 's8-grid-title';
  titleEl.textContent = 'איזה גופן מתאים לך?';
  grid.appendChild(titleEl);

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  for (let ci = 0; ci < 18; ci++) {
    const font = FONTS[ci % FONTS.length];
    const fi = ci % FONTS.length;
    const col = document.createElement('div');
    col.className = 'alpha-col';
    col.dataset.fi = fi;

    shuffle(HEBREW).forEach(letter => {
      const cell = document.createElement('div');
      cell.className = 'alpha-cell';
      cell.style.fontFamily = font.family;
      cell.textContent = letter;
      cell.addEventListener('click', () => {
        grid.querySelectorAll('.alpha-cell.sel').forEach(c => c.classList.remove('sel'));
        cell.classList.add('sel');
      });
      col.appendChild(cell);
    });

    const lbl = document.createElement('div');
    lbl.className = 'alpha-col-lbl';
    lbl.textContent = font.key;
    col.appendChild(lbl);

    col.addEventListener('mouseenter', () => {
      grid.classList.add('grid-hovered');
      col.classList.add('col-hovered');
      if (!state.typography) {
        const titleDiv = document.querySelector('.cp4-html-title');
        if (titleDiv) titleDiv.style.fontFamily = font.family;
      }
    });

    col.addEventListener('mouseleave', () => {
      col.classList.remove('col-hovered');
      grid.classList.remove('grid-hovered');
      if (!state.typography) {
        const titleDiv = document.querySelector('.cp4-html-title');
        if (titleDiv) titleDiv.style.fontFamily = "'Heebo', sans-serif";
      }
    });

    col.addEventListener('click', () => {
      state.typography = font;
      document.getElementById('font-btn').disabled = false;
      _syncPreviews();
    });

    grid.appendChild(col);
  }
})();

// ═══════════════════════════════════════════════
// COVER PREVIEW
// ═══════════════════════════════════════════════
function compHTML(size, pos, svgId, fg) {
  const w = size.w || 160, h = size.h || 240;
  const iw = parseFloat(pos.w)/100 * w;
  const ih = parseFloat(pos.h)/100 * h;
  const ix = parseFloat(pos.x)/100 * w - iw/2;
  const iy = parseFloat(pos.y)/100 * h - ih/2;
  const rot = pos.rot ? `transform="rotate(${pos.rot},${ix+iw/2},${iy+ih/2})"` : '';
  return `<image href="${svgId}" x="${ix}" y="${iy}" width="${iw}" height="${ih}" ${rot}/>`;
}

let _bxFid = 0;
function getPalImgTint(pal) {
  if (!pal) return null;
  if (pal.name === 'כהה וקרה')  return '#A0203A';
  if (pal.name === 'חמה ועשירה') return '#EAA71B';
  if (pal.name === 'רכה ועדינה')      return '#A855D4';
  if (pal.name === 'נועזת ופלורסנטית') return '#FF0066';
  return null;
}
function buildCoverSVG(W, H, bgColor, accentColor, imgSvg, titleText, titleFont, titleColor, comp, imgTint, bookTitle, nameColor) {

  let imgUse = '';
  const fg = titleColor || '#111111';
  const c = comp ? comp.key : 'מרכזי עם ריק';

  // Text positions — computed first so image can be clamped around them
  const authorName = titleText || '';
  const fontStr = titleFont ? titleFont.family : "'Heebo', sans-serif";

  let bookTitleY = H - 22, bookTitleSize = W * 0.1;
  let bookTitleX = W * 0.5, bookTitleAnchor = 'middle';
  let authorX = W * 0.5;
  if (c === 'מרכזי עם ריק')  { bookTitleY = H - 40; }
  if (c === 'טקסט דומיננטי') { bookTitleY = H * 0.62; bookTitleSize = W * 0.195; }
  if (c === 'מכסה הכל')      { bookTitleY = H * 0.15; bookTitleSize = W * 0.09 + 2; }
  if (c === 'חצוי')           { bookTitleY = H * 0.12; bookTitleX = W * 0.75; authorX = W * 0.78; }
  if (c === 'אסימטרי')        { bookTitleY = H * 0.14; bookTitleX = W * 0.72; bookTitleAnchor = 'end'; }

  // Safe image boundaries — keep image clear of text zones
  const CLEAR = 16;
  const titleTopY   = bookTitleY - bookTitleSize - CLEAR;
  const authorTopY  = H - 8 - W * 0.065 - CLEAR;
  const imgBottomMax = Math.min(titleTopY, authorTopY); // lowest the image may reach

  // Position based on composition
  const positions = {
    'מרכזי עם ריק':   {x:'50%',y:'40%',w:'55%',h:'55%'},
    'טקסט דומיננטי': {x:'78%',y:'20%',w:'30%',h:'30%'},
    'מכסה הכל':      {x:'50%',y:'60%',w:'95%',h:'72%'},
    'חצוי':          {x:'24%',y:'46%',w:'44%',h:'84%'},
    'אסימטרי':       {x:'28%',y:'64%',w:'50%',h:'48%', rot:'12'},
    '__logo_centered__': {x:'50%',y:'47%',w:'90%',h:'65%'}
  };
  const pos = positions[c] || positions['מרכזי עם ריק'];
  const iw = parseFloat(pos.w)/100*W;
  let ih = parseFloat(pos.h)/100*H;
  const ix = parseFloat(pos.x)/100*W - iw/2;
  let iy = parseFloat(pos.y)/100*H - ih/2;

  // Clamp image bottom to stay clear of text (skip full-bleed and rotated)
  if (c !== 'מכסה הכל' && !pos.rot && iy + ih > imgBottomMax) {
    ih = Math.max(iw * 0.25, imgBottomMax - iy);
  }

  const rot = pos.rot ? `transform="rotate(${pos.rot},${ix+iw/2},${iy+ih/2})"` : '';

  // Special case: scattered pattern for 'אסימטרי'
  if (c === 'אסימטרי' && imgSvg) {
    // Safe zone: avoid title (top ~20%) and author name (bottom ~14%)
    const safeTop    = H * 0.20;
    const safeBottom = H * 0.86;
    const safeH = safeBottom - safeTop;

    // Deterministic seed from imgSvg path
    let seed = 0;
    for (let i = 0; i < imgSvg.length; i++) seed = (seed * 31 + imgSvg.charCodeAt(i)) & 0xffff;
    function sr() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 16) / 65535; }

    // 9 instances in a loose grid (3 cols × 3 rows), with jitter
    const instances = [
      {cx:0.15, cy:0.20}, {cx:0.50, cy:0.15}, {cx:0.85, cy:0.22},
      {cx:0.10, cy:0.50}, {cx:0.50, cy:0.50}, {cx:0.88, cy:0.52},
      {cx:0.20, cy:0.80}, {cx:0.55, cy:0.82}, {cx:0.82, cy:0.78},
    ];

    const imgFilter = fg === '#111111' ? 'brightness(0)' : 'brightness(0) invert(1)';
    let tintDefs = '', tintFid = null;
    if (imgTint) {
      tintFid = `bxf${++_bxFid}`;
      const tr = parseInt(imgTint.slice(1,3),16)/255;
      const tg = parseInt(imgTint.slice(3,5),16)/255;
      const tb = parseInt(imgTint.slice(5,7),16)/255;
      tintDefs = `<defs><filter id="${tintFid}" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" result="m" values="-0.299 -0.587 -0.114 0 1 -0.299 -0.587 -0.114 0 1 -0.299 -0.587 -0.114 0 1 0 0 0 1 0"/>
        <feComponentTransfer in="m">
          <feFuncR type="linear" slope="${tr.toFixed(3)}" intercept="0"/>
          <feFuncG type="linear" slope="${tg.toFixed(3)}" intercept="0"/>
          <feFuncB type="linear" slope="${tb.toFixed(3)}" intercept="0"/>
        </feComponentTransfer>
      </filter></defs>`;
    }

    const clipId = `sc${++_bxFid}`;
    let imgs = '';
    instances.forEach(({cx, cy}) => {
      const jx = (sr() - 0.5) * 0.12;
      const jy = (sr() - 0.5) * 0.10;
      const sz = W * (0.18 + sr() * 0.14);
      const ang = (sr() - 0.5) * 36;
      const op = (0.38 + sr() * 0.38).toFixed(2);
      const px = (cx + jx) * W - sz / 2;
      const py = safeTop + (cy + jy) * safeH - sz / 2;
      const cx2 = px + sz/2, cy2 = py + sz/2;
      const filterAttr = imgTint ? `filter="url(#${tintFid})"` : `style="filter:${imgFilter}"`;
      imgs += `<image href="${imgSvg}" x="${px.toFixed(1)}" y="${py.toFixed(1)}" width="${sz.toFixed(1)}" height="${sz.toFixed(1)}" transform="rotate(${ang.toFixed(1)},${cx2.toFixed(1)},${cy2.toFixed(1)})" opacity="${op}" ${filterAttr} clip-path="url(#${clipId})"/>`;
    });

    imgUse = `${tintDefs}
      <defs><clipPath id="${clipId}"><rect width="${W}" height="${H}"/></clipPath></defs>
      ${imgs}`;

  } else if (imgTint) {
    const fid = `bxf${++_bxFid}`;
    const tr = parseInt(imgTint.slice(1,3),16)/255;
    const tg = parseInt(imgTint.slice(3,5),16)/255;
    const tb = parseInt(imgTint.slice(5,7),16)/255;
    imgUse = `
      <defs>
        <filter id="${fid}" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
          <feColorMatrix type="matrix" result="m"
            values="-0.299 -0.587 -0.114 0 1 -0.299 -0.587 -0.114 0 1 -0.299 -0.587 -0.114 0 1 0 0 0 1 0"/>
          <feComponentTransfer in="m">
            <feFuncR type="linear" slope="${tr.toFixed(3)}" intercept="0"/>
            <feFuncG type="linear" slope="${tg.toFixed(3)}" intercept="0"/>
            <feFuncB type="linear" slope="${tb.toFixed(3)}" intercept="0"/>
          </feComponentTransfer>
        </filter>
      </defs>
      <image href="${imgSvg}" x="${ix}" y="${iy}" width="${iw}" height="${ih}" ${rot} opacity=".95" filter="url(#${fid})"/>`;
  } else {
    const imgFilter = fg === '#111111' ? 'brightness(0)' : 'brightness(0) invert(1)';
    imgUse = `<image href="${imgSvg}" x="${ix}" y="${iy}" width="${iw}" height="${ih}" ${rot} opacity=".88" style="filter:${imgFilter}"/>`;
  }

  // Title position based on composition
  const bookTitleEl = `<text
    x="${bookTitleX}" y="${bookTitleY}"
    font-family="${fontStr}" font-size="${bookTitleSize}"
    fill="${fg}" text-anchor="${bookTitleAnchor}" opacity="0.9"
  >${bookTitle || 'כותרת'}</text>`;

  // Author name — always small and fixed at bottom, always in Arbel
  const authorEl = authorName ? `<text
    x="${authorX}" y="${H - 8}"

// SCORING

function calcScores() {
  const sc = { emotion:0, logic:0, intro:0, extro:0, order:0, chaos:0, connect:0, indep:0 };

  const addScore = (s) => {
    if (!s) return;
    if (s.A==='R') sc.emotion++; else sc.logic++;
    if (s.B==='P') sc.intro++;  else sc.extro++;
    if (s.C==='order') sc.order++; else sc.chaos++;
    if (s.D==='connect') sc.connect++; else sc.indep++;
  };

  // Genre
  const genreMap = {
    'רומנטיקה':   {A:'R',B:'E',C:'chaos',D:'connect'},
    'מתח ואימה':  {A:'S',B:'P',C:'order',D:'indep'},
    'פנטזיה':     {A:'R',B:'E',C:'chaos',D:'connect'},
    'מדע בדיוני': {A:'S',B:'P',C:'order',D:'indep'},
    'ספרות יפה':  {A:'R',B:'P',C:'order',D:'indep'},
    'ספרי עיון':  {A:'S',B:'P',C:'order',D:'indep'}
  };
  addScore(genreMap[state.genre]);

  // Color
  if (state.color) addScore(state.color.score);

  // Image
  if (state.image) addScore(state.image.score);

  // Composition
  if (state.composition) addScore(state.composition.score);

  // Typography
  if (state.typography) addScore(state.typography.score);

  // Sliders contribute slightly
  state.sliders.forEach((v,i) => {
    if (v >= 4) { // towards "left" pole
      if ([0,1,2].includes(i)) sc.logic += 0.5;
      else if ([3].includes(i)) sc.logic += 0.5;
      else if ([4].includes(i)) sc.logic += 0.3;
      else if ([5].includes(i)) sc.intro += 0.5;
      else if ([6].includes(i)) sc.intro += 0.5;
    } else if (v <= 2) { // towards "right" pole
      if ([0,1,2].includes(i)) sc.emotion += 0.5;
      else if ([3].includes(i)) sc.emotion += 0.5;
      else if ([4].includes(i)) sc.emotion += 0.3;
      else if ([5].includes(i)) sc.extro += 0.5;
      else if ([6].includes(i)) sc.extro += 0.5;
    }
  });

  state.scores = sc;
  return sc;
}

          ];
          instances.forEach(({cx, cy}) => {
            const scale = 0.22 + sr() * 0.18;
            const iw2 = COV_W * scale, ih2 = iw2;
            const rot2 = (sr() - 0.5) * 40;
            const op2 = 0.55 + sr() * 0.35;
            const rawY = safeTop + cy * (safeBottom - safeTop);
            const ix2 = cx * COV_W - iw2 / 2;
            const iy2 = rawY - ih2 / 2;
            drawTinted(ix2, iy2, iw2, ih2, op2, rot2);
          });
        } else {
          const POS = {
            'מרכזי עם ריק':  { cx:.50, cy:.40, pw:.55, ph:.55 },
            'טקסט דומיננטי':{ cx:.78, cy:.20, pw:.30, ph:.30 },
            'מכסה הכל':     { cx:.50, cy:.60, pw:.95, ph:.72 },
            'חצוי':         { cx:.24, cy:.46, pw:.44, ph:.84 },
          };
          const p = POS[ck] || POS['מרכזי עם ריק'];
          const iw = p.pw * COV_W, ih = p.ph * COV_H;
          const ix = p.cx * COV_W - iw / 2;
          let iy = p.cy * COV_H - ih / 2;
          if (ck !== 'מכסה הכל') {
            const imgBottomMax = tY - COV_H * 0.08;
            if (iy + ih > imgBottomMax) iy = imgBottomMax - ih;
          }
          drawTinted(ix, iy, iw, ih, 0.88, 0);
        }
      }

      // title + author
      const ff = font ? font.family.replace(/['"]/g, '') : 'Heebo';
      const ts = Math.round(COV_W * 0.10);
      const as = Math.round(COV_W * 0.065);
      oc2.direction = 'rtl'; oc2.textAlign = 'center';
      oc2.fillStyle = fg; oc2.globalAlpha = 1.0;
      oc2.font = `bold ${ts}px ${ff}, Heebo, sans-serif`;
      oc2.fillText(title, tX, tY);
      oc2.globalAlpha = 0.75;
      oc2.font = `${as}px Arbel, sans-serif`;
      oc2.fillText(name, COV_W * 0.5, COV_H - 14);

      // squish into FRONT slot (GPU un-squishes back to correct proportions)
      ctx.save();
      ctx.beginPath(); ctx.rect(FRONT.x, FRONT.y, FRONT.w, FRONT.h); ctx.clip();
      ctx.drawImage(oc, FRONT.x, FRONT.y, FRONT.w, FRONT.h);
      ctx.restore();
      callback(canvas);
    }

    document.fonts.ready.then(() => {
      const loadOne = src => new Promise(res => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = () => res(null);
        img.src = src;
      });

      // Load logo via fetch→data URL to avoid canvas taint on file://
      const logoPromise = fetch('logo.svg')
        .then(r => r.text())
        .then(text => loadOne('data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(text)))))
        .catch(() => null);

      const bookPromise = imgPath ? loadOne(imgPath) : Promise.resolve(null);

      Promise.all([bookPromise, logoPromise]).then(([bookImg, logoImg]) => {
        // Check taint (file:// security)
        if (bookImg) {
          try {
            const t = document.createElement('canvas'); t.width = 1; t.height = 1;
            t.getContext('2d').drawImage(bookImg, 0, 0, 1, 1);
            t.toDataURL();
          } catch(e) { bookImg = null; }
        }
        draw(bookImg, logoImg);
      });
    });
  }

  function parseOBJ(text) {
    const pos = [], uvs = [], norms = [], objs = {};
    let cur = null;
    for (const raw of text.split('\n')) {
      const p = raw.trim().split(/\s+/);
      if (p[0] === 'v')  { pos.push(+p[1], +p[2], +p[3]); }
      else if (p[0] === 'vt') { uvs.push(+p[1], +p[2]); }
      else if (p[0] === 'vn') { norms.push(+p[1], +p[2], +p[3]); }
      else if (p[0] === 'o')  { cur = p[1]; objs[cur] = []; }
      else if (p[0] === 'f' && cur) {
        const vs = p.slice(1).map(s => {
          const t = s.split('/');
          return { vi: (+t[0]||1)-1, ti: t[1]===''||!t[1] ? -1 : (+t[1])-1, ni: (+t[2]||1)-1 };
        });
        for (let i = 1; i < vs.length-1; i++) {
          objs[cur].push(vs[0], vs[i], vs[i+1]);
        }
      }
    }
    const group = new THREE.Group();
    for (const [name, faces] of Object.entries(objs)) {
      if (!faces.length) continue;
      const pa = [], ua = [], na = [];
      for (const v of faces) {
        pa.push(pos[v.vi*3], pos[v.vi*3+1], pos[v.vi*3+2]);
        if (v.ti >= 0) ua.push(1 - uvs[v.ti*2], uvs[v.ti*2+1]);
        na.push(norms[v.ni*3], norms[v.ni*3+1], norms[v.ni*3+2]);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pa, 3));
      if (ua.length === pa.length/3*2) geo.setAttribute('uv', new THREE.Float32BufferAttribute(ua, 2));
      if (na.length) geo.setAttribute('normal', new THREE.Float32BufferAttribute(na, 3));
      else geo.computeVertexNormals();
      const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x888888 }));
      mesh.name = name;
      group.add(mesh);
    }
    return group;
  }

  function buildBook() {
    if (typeof THREE === 'undefined') { console.error('S9: THREE not loaded'); return; }
    const parsed = parseOBJ(OBJ_DATA);

    // Center ONLY the book (exclude the huge floor plane Plane_Plane.020 which is ±15 units)
    const bookBox = new THREE.Box3();
    parsed.traverse(child => {
      if (!child.isMesh) return;
      const n = child.name || '';
      if (n.match(/Plane_Plane|\.020/)) return; // skip floor plane
      child.geometry.computeBoundingBox();
      const gb = child.geometry.boundingBox.clone();
      // apply mesh's own matrix
      child.updateMatrixWorld(true);
      bookBox.union(gb);
    });
    const c = new THREE.Vector3();
    bookBox.getCenter(c);
    // Shift ALL mesh geometries (including hidden plane) so book is centered at origin
    parsed.traverse(child => {
      if (child.isMesh) {
        child.geometry.translate(-c.x, -c.y, -c.z);
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    // Assign materials
    parsed.traverse(child => {
      if (!child.isMesh) return;
      const n = (child.name || '') + '|' + ((child.parent && child.parent.name) || '');
      if (n.match(/Plane_Plane|\.020/)) {
        child.visible = false;
      } else if (n.match(/Plane\.019|\.019/)) {
        child.material = new THREE.MeshStandardMaterial({
          color: 0xEDE8DF, roughness: 0.92, metalness: 0.0,
          side: THREE.DoubleSide
        });
      } else {
        child.material = new THREE.MeshStandardMaterial({
          roughness: 0.52, metalness: 0.06,
          side: THREE.DoubleSide
        });
        child._isCover = true;
      }
    });

    // The OBJ book lies flat: X=width, Y=thickness (front cover faces +Y), Z=height
    // Use quaternion to orient correctly:
    //   OBJ height direction (0.943,0,0.332) → world +Y (upright)
    //   OBJ front cover normal (0,1,0) → world +Z (facing camera)
    //   OBJ right direction = cross(front,height) → world +X
    const bookFront  = new THREE.Vector3(0, 1, 0);
    const bookHeight = new THREE.Vector3(0.943, 0, 0.332).normalize();
    const bookRight  = new THREE.Vector3().crossVectors(bookHeight, bookFront).normalize();
    // Build rotation matrix R: maps OBJ axes to world axes
    const M = new THREE.Matrix4().makeBasis(bookRight, bookHeight, bookFront);
    M.transpose(); // R = M^T (since M is orthonormal, inverse = transpose)
    const innerQuat = new THREE.Quaternion().setFromRotationMatrix(M);

    threeInner = parsed;
    threeInner.quaternion.copy(innerQuat);

    // Wrap in pivot group — tick() animates pivot.rotation.y for spinning
    const pivot = new THREE.Group();
    pivot.add(threeInner);
    threeBook = pivot;
    threeBook.rotation.y = rotY; // rotY = Math.PI → start with front facing camera
    threeScene.add(threeBook);
    console.log('S9: book loaded and added to scene');
    applyTexture();
  }

  function initRenderer() {
    if (threeRenderer) return;
    const sceneEl = document.getElementById('s9-scene');
    if (!sceneEl) { console.error('S9: s9-scene not found'); return; }
    if (typeof THREE === 'undefined') { console.error('S9: THREE not loaded'); return; }

    const rect = sceneEl.getBoundingClientRect();
    const W = Math.round(rect.width)  || sceneEl.offsetWidth  || (window.innerWidth - 80);
    const H = Math.round(rect.height) || sceneEl.offsetHeight || Math.round(window.innerHeight * 0.55);
    console.log('S9: initRenderer', W, 'x', H);

    threeScene = new THREE.Scene();
    threeScene.background = new THREE.Color(0xFFFAF1);

    threeCamera = new THREE.PerspectiveCamera(28, W / H, 0.1, 100);
    threeCamera.position.set(0, 0.1, 5);
    threeCamera.lookAt(0, 0, 0);

    threeRenderer = new THREE.WebGLRenderer({
      antialias: true,
      canvas: document.getElementById('s9-three-canvas')
    });
    threeRenderer.setSize(W, H);
    threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    threeRenderer.shadowMap.enabled = true;
    threeRenderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.55);
    threeScene.add(ambient);
    const key = new THREE.DirectionalLight(0xffffff, 0.9);
    key.position.set(2, 5, 4); key.castShadow = true;
    threeScene.add(key);
    const fill = new THREE.DirectionalLight(0xfff8e8, 0.35);
    fill.position.set(-3, 1, 2);
    threeScene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.2);
    rim.position.set(0, -2, -3);
    threeScene.add(rim);

    buildBook();
  }

  function applyTexture() {
    console.log('S9 applyTexture called, threeBook=', !!threeBook);
    if (!threeBook) return;
    buildTextureCanvas(canvas => {
      const tex = new THREE.CanvasTexture(canvas);
      tex.flipY = false;
      threeBook.traverse(child => {
        if (child.isMesh && child._isCover) {
          child.material.map = tex;
          child.material.needsUpdate = true;
        }
      });
    });
  }

  function tick() {
    if (!threeActive || !threeRenderer) return;
    if (!isDragging) {
      if (Math.abs(vel) < 0.001) vel = 0.003;
      else vel *= 0.985;
    }
    rotY += vel;
    if (threeBook) threeBook.rotation.y = rotY;
    threeRenderer.render(threeScene, threeCamera);
    threeRafId = requestAnimationFrame(tick);
  }

  window._s9SpinStart = function() {
    if (!threeRenderer) {
      initRenderer();
    } else {
      // resize if scene dimensions changed
      const sceneEl = document.getElementById('s9-scene');
      if (sceneEl) {
        const rect = sceneEl.getBoundingClientRect();
        const W = Math.round(rect.width) || 400;
        const H = Math.round(rect.height) || 350;
        if (Math.abs(threeRenderer.domElement.width / window.devicePixelRatio - W) > 4) {
          threeRenderer.setSize(W, H);
          if (threeCamera) { threeCamera.aspect = W / H; threeCamera.updateProjectionMatrix(); }
        }
      }
    }
    threeActive = true; vel = 0.003;
    if (threeBook) applyTexture();
    if (!threeRafId) tick();
  };
  window._s9SpinStop = function() {
    threeActive = false;
    if (threeRafId) { cancelAnimationFrame(threeRafId); threeRafId = null; }
  };
  window._s9UpdateTexture = function() { applyTexture(); };

  // Mouse drag with inertia
  document.addEventListener('mousedown', e => {
    const scene = document.getElementById('s9-scene');
    if (!scene || !scene.contains(e.target)) return;
    isDragging = true; lastX = e.clientX; vel = 0; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    vel = Math.max(-0.12, Math.min(0.12, dx * 0.008));
    lastX = e.clientX;
  });
  document.addEventListener('mouseup',    () => { isDragging = false; });
  document.addEventListener('mouseleave', () => { isDragging = false; });

  // Touch support
  document.addEventListener('touchstart', e => {
    const scene = document.getElementById('s9-scene');
    if (!scene || !scene.contains(e.target)) return;
    isDragging = true; lastX = e.touches[0].clientX; vel = 0;
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - lastX;
    vel = Math.max(-0.12, Math.min(0.12, dx * 0.008));
    lastX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', () => { isDragging = false; });
})();

async function proceedToReveal() {
  // Check if we have API key
  if (!state.apiKey) {
    document.getElementById('api-modal').classList.add('show');
    return;
  }
  go(9);
}

function saveApiKey() {
  state.apiKey = document.getElementById('api-key-inp').value.trim();
  document.getElementById('api-modal').classList.remove('show');
  if (state.apiKey) {
    go(9);
  }
}

function skipApi() {
  state.apiKey = 'DEMO';
  document.getElementById('api-modal').classList.remove('show');
  go(9);
}

async function triggerReveal() {
  syncPreviews();

  // Animate cover reveal + start spin
  const scene = document.getElementById('s9-scene');
  if (scene) scene.classList.remove('show');
  if (window._s9SpinStop) window._s9SpinStop();
  setTimeout(() => {
    if (scene) scene.classList.add('show');
    if (window._s9SpinStart) window._s9SpinStart();
  }, 300);

  // Fetch summary
  const sc = calcScores();
  const profile = {
    emotion: sc.emotion > sc.logic ? 'רגשי' : 'שכלי',
    social:  sc.intro > sc.extro   ? 'מופנם' : 'מוחצן',
    order:   sc.order > sc.chaos   ? 'מסודר' : 'ספונטני',
    connect: sc.connect > sc.indep ? 'מחפש קשר' : 'עצמאי'
  };

  const summaryEl = document.getElementById('summary-text');

  function _applyGenerated(title, summary) {
    state.bookTitle = title;
    state.summary   = summary;
    summaryEl.textContent = summary;
    summaryEl.classList.add('show');
    const pcSum  = document.getElementById('pc-back-summary');
    const pcName = document.getElementById('pc-back-name');
    if (pcSum)  pcSum.textContent  = summary;
    if (pcName) pcName.textContent = state.name || '';
    // Show generated text in screen 9 info panel
    const infoTitle   = document.getElementById('s9-info-title');
    const infoSummary = document.getElementById('s9-info-summary');
    if (infoTitle)   infoTitle.textContent   = title;
    if (infoSummary) infoSummary.textContent = summary;
    updatePreview();
  }

  if (state.apiKey === 'DEMO') {
    const demo = demoGenerate(profile);
    _applyGenerated(demo.title, demo.summary);
    return;
  }

  try {
    const prompt = `אתה כותב תוכן לכריכת ספר אישי עבור ${state.name}.
פרופיל המשתמש:
- רגש/שכל: ${profile.emotion}
- פנים/חוץ: ${profile.social}
- סדר/כאוס: ${profile.order}
- קשר/עצמאות: ${profile.connect}
- ז'אנר: ${state.genre}
- ערכים (1-5): כיפי↔רציני: ${state.sliders[0]}, אידיאליסטי↔ריאליסטי: ${state.sliders[1]}, נגיש↔יוקרתי: ${state.sliders[2]}, רטרו↔עתידני: ${state.sliders[3]}, אופטימי↔פסימי: ${state.sliders[4]}, אישי↔אוניברסלי: ${state.sliders[5]}, פנימי↔חיצוני: ${state.sliders[6]}

החזר JSON בדיוק בפורמט הזה (ללא טקסט נוסף):
{"title":"כותרת הספר","summary":"תקציר של 4-5 שורות"}

הכותרת: שם ספר קצר ופואטי (2-4 מילים) שמתאים לאישיות. לא שם פרטי.
התקציר: כתוב בגוף שני, כגב ספר ספרותי. מתחיל עם שם המשתמש. אל תזכיר ניתוח פסיכולוגי.
הכל בעברית בלבד.`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    let raw = data.content[0].text.trim();
    // Strip markdown code fences if present
    raw = raw.replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/,'');
    const parsed = JSON.parse(raw);
    _applyGenerated(parsed.title || '', parsed.summary || raw);
  } catch(e) {
    console.error(e);
    const demo = demoGenerate(profile);
    _applyGenerated(demo.title, demo.summary);
  }
}

      `${name} מרגיש/ה לפני שמבין/ה.\nוזה לא חולשה - זאת הדרך לקרוא את העולם.\nלפעמים זה מוציא אותך מהמסלול.\nלפעמים זה מביא אותך בדיוק לאן שצריך.\nההרפתקה המופלאה שלך רק החלה.`,
      `${name} נהנית מההפתעות הקטנות שבחיים,\nאי אפשר לדעת מה צופן בעתיד.\nלמעשה, גם ההווה שלנו כרגע לא כל כך ברור\nאבל אנחנו פשוט ממשיכים.`,
    ],
    'רגשי_מוחצן_מסודר': [
      `${name} יודע/ת להיות בחדר מלא אנשים ועדיין להיות לבד לגמרי.\nאוסף/ת רגעים כמו מי שמפחד שישכח.\nיש לך מתנה - את/ה גורם/ת לאנשים להרגיש נראים.\nרק לפעמים שוכח/ת לעשות את זה לעצמך.\nאל תשכח/י מי את/ה ומי נשאר/ת איתך בסופו של יום.`,
      `${name} אוהב/ת אנשים — ממש אוהב/ת אותם.\nאבל בסוף הערב, כשכולם הולכים, יש תחושה קטנה שמישהו לא ראה אותך.\nאת/ה לא בטוח/ה מי זה צריך להיות.\nאבל את/ה יודע/ת שאת/ה מחפש/ת.\nהסיפור שלך צריך להישמע.`,
      `${name} מחזיק/ה את החדר יחד.\nמחייך/ת, שואל/ת, מכיל/ה — ואיכשהו תמיד יודע/ת מה אנשים צריכים.\nהשאלה שאף אחד לא שואל אותך: מה את/ה צריך/ה?\nהאם קריאה בספר זה תעניק לך את הפתרון?`,
      `${name} יוצא/ת למסע מופלא ומשונה,\nהכאוס הזה אינו משתלט עלייך, אבל הוא ממשיך לנסות.\nאת/ה בעל/ת חסינות גבוהה מאוד.\nאת/ה לא יודע/ת לוותר כל כך בקלות אלא את/ה נשאר/ת נחוש/ה.`,
    ],
    'רגשי_מוחצן_ספונטני': [
      `${name} חי/ה בקול רם ובצבעים.\nכל החלטה מרגישה כמו קפיצה — וזה בסדר גמור.\nאנשים סביבך מרגישים חיים יותר.\nואת/ה? את/ה מרגיש/ה הכי חי/ה כשמשהו עוד לא ידוע.`,
      `${name} לא צריך/ה הרבה זמן כדי להרגיש - את/ה כבר שם.\nאבל לפעמים העוצמה הזו מפחידה אפילו אותך.\nואז את/ה עושה עוד משהו, פוגש/ת עוד מישהו, יוצר/ת עוד.\nזה לא בריחה. זה הדרך שלך לנשום.\nזה בסדר.`,

    ],
    'שכלי_מופנם_מסודר': [
      `${name} בונה מערכות. אוהב/ת שדברים נופלים למקומם.\nאבל לפעמים בלילה את/ה שואל/ת אם הסדר הוא מגן או כלא.\nהתשובה, כמו תמיד, יותר מסובכת ממה שחשבת.\nוזה, מוזר ככל שישמע, מנחם.`,
      `${name} מעדיף/ה להבין לפני שמרגיש/ה.\nזה עובד רוב הזמן. אבל יש דברים שלא נכנסים לתרשים.\nאת/ה לומד/ת לשבת איתם בכל זאת.\nלאט, בזהירות - בדרך שלך.\nזה הסיפור שלך.`,
      `${name} חושב/ת בדיוק. מתכנן/ת בקפידה. מצפה לסדר.\nואז החיים עושים משהו שלא היה בתוכנית.\nוגם אז - את/ה מוצא/ת דרך לסדר את זה.\nרק לפעמים צריך קצת יותר זמן.`,
      `${name} הדמות הראשית שלנו בעלת סוד עמוק ואפל,\nהסובבים אותך גם לא יודעים זאת,\nלא קל להבין אותך,\nאולי כי גם את/ה לא מבין/ה את עצמך כל כך טוב\nאבל אם את/ה כאן, כנראה שאת/ה מנסה.`,
    ],
    'שכלי_מופנם_ספונטני': [
      `${name} יש לך תיאוריה על כמעט כל דבר.\nאבל הדבר הכי מעניין קרה בדיוק כשהפסקת לתכנן.\nאולי הכאוס הוא רק סדר שעוד לא הבנת.\nאולי לא. שניהם נשמעים נכון.`,
      `${name} מסוגל/ת לחשוב על עשרה דברים בו זמנית\nואף אחד מהם לא בסדר הנכון.\nאבל בדיוק מהבלגן הזה - צצים הרעיונות הכי חדים.\nואת/ה יודע/ת זאת.`,
      `${name} סקרן/ית יותר מכל דבר אחר.\nשאלה מעניינת שווה לך יותר מכל תשובה מוכנה.\nואם התשובה מוציאה אותך ממסלול - מצוין.\nזה אומר שזה מעניין.\nאל תירתע/י מזה. זאת העלילה שלך, זה הספר שלך.`,
      `${name} הלך/ה קצת לאיבוד בדרך\nאבל וואו, כמה שהדרך החדשה הזאת יפה ומעניינת.\nזה די בגדול מתאר את מי שאת/ה -\nנוטה לכיוון ההיגיון מאשר הרגש, אבל יודע/ת להעריך את הכל בחיים. גם לרגש.`,
    ],
    'שכלי_מוחצן_מסודר': [
      `${name} יודע/ת לדבר בצורה שאנשים מבינים.\nמסביר/ה, מארגן/ת, מוביל/ה — לפעמים מתוך כוח, לפעמים מתוך צורך.\nבפנים יש שאלה שחוזרת: האם מספיק לעשות טוב, או שצריך גם להרגיש טוב?\nאין לך תשובה עדיין. אבל את/ה שואל/ת - וזה מה שחשוב.`,
      `${name} יודע/ת לקחת דברים מסובכים ולהפוך אותם לברורים.\nזה כוח אמיתי. אנשים סומכים עליך בגלל זה.\nאבל לפעמים את/ה רוצה שמישהו יעשה את זה בשבילך -\nפשוט יגיד לך: הכל בסדר, את/ה בכיוון.`,
      `${name} יש לך מבנה פנימי חזק - ערכים ברורים, כיוון מוגדר.\nאנשים מרגישים את זה ובאים אליך.\nהדבר שאף אחד לא רואה: כמה עבודה הושקעה בלבנות את זה.`,
      `${name} לא מתבייש/ת להביע בקול את מה שמרגיש/ה.\nלמה גם לא בעצם?\nמישהו צריך!\nהבעיה? שלא תמיד יש את מי שיקשיב באמת.\nאת/ה יודע/ת את זה, אבל עדיין לקרוא את זה לא הופך את זה ליותר קל.`,
    ],
    'שכלי_מוחצן_ספונטני': [
      `${name} חושב/ת מהר ומדבר/ת אפילו יותר מהר.\nהעולם מרגיש כמו שדה משחק של רעיונות,\nוכל אדם שאת/ה פוגש/ת הוא פרק חדש.\nהספר הזה לא מסתיים. הוא רק מתחיל שוב.`,
      `${name} מתחיל/ה שיחות שמשנות כיוון בתוך שלוש שניות.\nרעיון מוביל לרעיון מוביל לרעיון - וכל עצירה מרגישה כמו בזבוז.\nאנשים לפעמים מתקשים לעקוב.\nאבל מי שמצליח - לא שוכח את זה.`,
      `${name} נולד/ה עם קצב פנימי שרץ קצת יותר מהר משל כולם.\nמחשבות, מילים, תוכניות - הכל בבת אחת.\nוכשמשהו תופס את תשומת ליבך?\nהעולם כולו נעצר עד שמבינים.`,
      `${name} עלול/ה לאבד את חוט המחשבה קצת מהר מידי מאחרים,\nהמוח לא נח לרגע, יש כל כך הרבה מה להספיק,\nמה להגיד,\nמה לחוות,\nממה מתחילים?\nוכיצד ממשיכים מכאן?`,
    ],
  };

  const summaryKey = `${emotion}_${social}_${order}`;
  const summaryList = summaryMap[summaryKey] || summaryMap[`${emotion}_${social}_מסודר`] || [
    `${name} יודע/ת לשמור דברים לעצמם.\nיש בך עולמות שלמים שרק מעטים זכו להציץ אליהם -\nוגם הם לא ראו הכל.\nפעם תצא/י מהדלת הזו. פעם תגיד/י את זה בקול.\nעד אז, הסיפור יישאר בסוד.`,
    `${name} הוא/היא הסוג שנוכח/ת גם כששקט/ה.\nלא צריך/ה לצעוק כדי שירגישו אותך.\nיש בך עומק שרוב האנשים לא מגיעים אליו -\nלא כי הם לא רוצים. כי הדרך שם דורשת סבלנות.`,
    `${name} לא תמיד יודע/ת מה להגיד — אבל תמיד יודע/ת מה מרגיש/ה.\nוזה, בסופו של דבר, הרבה יותר נדיר.\nזה הסיפור שלך, שווה להתחיל לקרוא.`,
  ];
  const summary = summaryList[Math.floor(Math.random() * summaryList.length)];

  return { title, summary };
}

function buildBackCoverDataUrl(callback) {
  const W = 600, H = 900;
  const bg       = state.color ? state.color.colors[0] : '#111111';
  const accent   = state.color ? state.color.colors[2] : null;
  const fg       = state.color ? state.color.textColor : '#FFFAF1';
  const tintColor = getPalImgTint(state.color) || fg;
  const summary  = state.summary || '';

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  if (accent) {
    ctx.save(); ctx.globalAlpha = 0.12; ctx.fillStyle = accent;
    ctx.fillRect(0, 0, W, H); ctx.restore();
  }

  // Summary text (Arbel renders natively in canvas)
  if (summary) {
    document.fonts.ready.then(() => {
      const fs = Math.max(18, Math.round(W * 0.052));
      ctx.save();
      ctx.font = `${fs}px Arbel, sans-serif`;
      ctx.fillStyle = fg; ctx.globalAlpha = 0.82;
      ctx.textAlign = 'center'; ctx.direction = 'rtl';
      const maxW = W * 0.80;
      const words = summary.split(' ');
      const lines = []; let cur = words[0] || '';
      for (let i = 1; i < words.length; i++) {
        const test = cur + ' ' + words[i];
        if (ctx.measureText(test).width > maxW) { lines.push(cur); cur = words[i]; }
        else cur = test;
      }
      if (cur) lines.push(cur);
      const lh = fs * 1.7;
      let ty = (H - lines.length * lh) / 2 + fs;
      for (const l of lines) { ctx.fillText(l, W / 2, ty); ty += lh; }
      ctx.restore();
      addLogo();
    });
  } else {
    addLogo();
  }

  function addLogo() {
    fetch('logo.svg')
      .then(r => r.text())
      .then(text => {
        const img = new Image();
        img.onload = () => {
          const lw = Math.round(W * 0.38);
          const lh2 = Math.round(lw * (img.height / img.width));
          const lx = W - lw - Math.round(W * 0.08);
          const ly = H - lh2 - Math.round(H * 0.05);
          const lc = document.createElement('canvas');
          lc.width = lw; lc.height = lh2;
          const lctx = lc.getContext('2d');
          lctx.drawImage(img, 0, 0, lw, lh2);
          lctx.globalCompositeOperation = 'source-atop';
          lctx.fillStyle = tintColor;
          lctx.fillRect(0, 0, lw, lh2);
          ctx.save(); ctx.globalAlpha = 0.7;
          ctx.drawImage(lc, lx, ly, lw, lh2);
          ctx.restore();
          callback(canvas.toDataURL('image/png'));
        };
        img.onerror = () => callback(canvas.toDataURL('image/png'));
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(text)));
      })
      .catch(() => callback(canvas.toDataURL('image/png')));
  }
}

function printPostcard() {
  const bg    = state.color ? state.color.colors[0] : '#111111';
  const accent= state.color ? state.color.colors[2] : null;
  const fg    = state.color ? state.color.textColor : '#111111';
  const imgSvg= state.image ? state.image.svg : null;
  const comp  = state.composition;
  const font  = state.typography;
  const name  = state.name || '';
  const summary = state.summary || document.getElementById('summary-text')?.textContent || '';

  const W = 283, H = 425;
  const frontSVG = buildCoverSVG(W, H, bg, accent, imgSvg, name, font, fg, comp, getPalImgTint(state.color), state.bookTitle || '', state.color?.nameColor);

  buildBackCoverDataUrl(backDataUrl => {
    const baseHref = document.location.href.replace(/[^/]*$/, '');
    const ck = comp ? comp.key : '';
    const titleStyle = (() => {
      if (ck === 'מכסה הכל')       return `top:${Math.round(H*0.10)}px;`;
      if (ck === 'חצוי')           return `top:${Math.round(H*0.07)}px;text-align:right;right:8%;left:auto;`;
      if (ck === 'אסימטרי')        return `top:${Math.round(H*0.09)}px;text-align:right;right:8%;left:auto;`;
      if (ck === 'טקסט דומיננטי')  return `top:${Math.round(H*0.56)}px;font-size:${Math.round(W*0.18)}px;`;
      return `bottom:${Math.round(H*0.13)}px;`;
    })();

    const html = `<!DOCTYPE html>
<html dir="rtl"><head><meta charset="utf-8">
<base href="${baseHref}">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Amatic+SC:wght@700&family=Caveat:wght@400;700&family=Share+Tech+Mono&display=swap">
<style>
  @font-face { font-family: 'Arbel';          src: url('ArbelG-Regular.otf') format('opentype'); }
  @font-face { font-family: 'Masada';         src: url('Masada-BoldItalic.otf') format('opentype'); font-weight:bold;font-style:italic; }
  @font-face { font-family: 'OHSalmanHabaka'; src: url('פונטים/OHSalmanHabaka1.0-Regular.otf') format('opentype'); }
  @font-face { font-family: 'FlamingoBM';     src: url('פונטים/flamingo-regular-fm.otf') format('opentype'); }
  @font-face { font-family: 'IndexDL';        src: url('פונטים/index-mono-regular-aaa.otf') format('opentype'); }
  @page { size: 10cm 15cm; margin: 0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .page { position: relative; width: 10cm; height: 15cm; overflow: hidden; page-break-after: always; }
  .page svg { display: block; width: 100%; height: 100%; }
  .page svg text { display: none; }
  .back { width: 10cm; height: 15cm; overflow: hidden; }
  .back img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .html-title {
    position: absolute; left: 0; right: 0;
    font-size: ${Math.round(W * 0.09)}px;
    color: ${fg}; text-align: center; direction: rtl;
    font-family: ${font ? font.family : "'Heebo', sans-serif"};
    padding: 0 8px; line-height: 1.2; pointer-events: none;
  }
  .html-author {
    position: absolute; left: 0; right: 0; bottom: 8px;
    font-size: ${Math.round(W * 0.065)}px;
    color: ${state.color?.nameColor || fg};
    text-align: center; direction: rtl;
    font-family: 'Arbel', sans-serif; opacity: 0.55; pointer-events: none;
  }
</style></head><body>
<div class="page">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">${frontSVG}</svg>
  <div class="html-title" style="${titleStyle}">${(state.bookTitle || '').replace(/</g,'&lt;')}</div>
  ${name ? `<div class="html-author">${name.replace(/</g,'&lt;')}</div>` : ''}
</div>
<div class="back">
  <img src="${backDataUrl}" alt="">
</div>
</body></html>`;

    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:10cm;height:30cm;border:none;';
    document.body.appendChild(iframe);
    iframe.onload = () => {
      const win = iframe.contentWindow;
      const doPrint = () => { win.print(); setTimeout(() => document.body.removeChild(iframe), 1000); };
      if (win.document.fonts?.ready) win.document.fonts.ready.then(doPrint);
      else setTimeout(doPrint, 1200);
    };
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
  });
}

const LIBRARY_KEY = 'bythecover_library';

const DEFAULT_COVER = {
  id: '__default__',
  name: 'נוגה נחמן',
  bookTitle: ' ',
  summary: 'עבודה זו מתנגדת לאמירה הידועה: "אל תשפוט ספר לפי הכריכה שלו" – זאת מכיוון שהאופן בו אנו שופטים לפי הכריכה משפיע על עולם התוכן שנצרוך ונקרא.\nהממשק מזמין אותנו לחוות ולגלות שהכריכה לא מספרת לנו רק על תוכן הספר, אלא גם על מי שאנחנו.',
  color: { name:'שחורה', colors:['#111111','#1a1a1a','#222222','#333333'], textColor:'#ffffff' },
  image: { key:'לוגו', svg:'logo.svg' },
  composition: { key:'__logo_centered__' },
  typography: { key:'Frank Ruhl Libre', family:"'Frank Ruhl Libre', Georgia, serif" }
};

function loadLibrary() {
  try { return JSON.parse(localStorage.getItem(LIBRARY_KEY)) || []; }
  catch { return []; }
}

function loadLibraryWithDefault() {
  const lib = loadLibrary();
  return [DEFAULT_COVER, ...lib];
}

function saveToLibrary() {
  if (!state.color || !state.image) return;
  const lib = loadLibrary();
  // Skip if identical to last saved cover
  const last = lib[lib.length - 1];
  if (last && last.name === (state.name || '') &&
      last.image?.svg === state.image?.svg &&
      last.color?.colors?.[0] === state.color?.colors?.[0]) return;
  lib.push({
    color:       state.color,
    image:       state.image,
    composition: state.composition,
    typography:  state.typography,
    name:        state.name || '',
    bookTitle:   state.bookTitle || '',
    summary:     state.summary || '',
    id:          Date.now()
  });
  if (lib.length > 60) lib.shift();
  try { localStorage.setItem(LIBRARY_KEY, JSON.stringify(lib)); } catch {}
}

let libZoom = 1, libTX = 0, libTY = 0;
let libTargetX = 0, libTargetY = 0;
let libRafId = null;

function renderLibrary() {
  saveToLibrary();
  const allCovers = JSON.parse(localStorage.getItem(LIBRARY_KEY) || '[]');
  const covers = allCovers.slice(-30);
  const lib = [DEFAULT_COVER, ...covers];
  const grid = document.getElementById('library-grid');
  if (!grid) return;
  grid.innerHTML = '';

  lib.forEach(entry => {
    const W = 112, H = 168;
    const bg     = entry.color?.colors?.[0]  || '#111';
    const accent = entry.color?.colors?.[2]  || null;
    const fg     = entry.color?.textColor    || '#fff';
    const imgSvg = entry.image?.svg          || null;
    const inner  = buildCoverSVG(W, H, bg, accent, imgSvg, entry.name,
                                 entry.typography, fg, entry.composition,
                                 getPalImgTint(entry.color), entry.bookTitle || '', entry.color?.nameColor);
    const spineCol = entry.color?.colors?.[1];
    const spineGrad = spineCol
      ? `linear-gradient(to right, color-mix(in srgb,${spineCol} 50%,#000) 0%, ${spineCol} 45%, color-mix(in srgb,${spineCol} 70%,#000) 100%)`
      : 'linear-gradient(to right, #080808 0%, #242424 55%, #111 100%)';
    const div = document.createElement('div');
    div.className = 'lib-book';
    div.style.setProperty('--lib-spine', spineGrad);
    div.innerHTML = `<div class="lib-book-face"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">${inner}</svg></div>`;

    // HTML overlays so custom fonts render reliably (same pattern as screen 8/9)
    const face = div.querySelector('.lib-book-face');
    face.style.position = 'relative';
    face.querySelectorAll('text').forEach(t => (t.style.display = 'none'));

    const fontFamily = entry.typography ? entry.typography.family : "'Heebo', sans-serif";
    const comp = entry.composition ? entry.composition.key : '';

    const titleOv = document.createElement('div');
    titleOv.className = 'lib-html-title';
    titleOv.style.fontFamily = fontFamily;
    titleOv.style.color = fg;
    titleOv.textContent = entry.bookTitle || '';
    // position by composition
    if (comp === 'מכסה הכל')     { titleOv.style.top = '8%';  titleOv.style.bottom = ''; }
    else if (comp === 'חצוי')    { titleOv.style.top = '8%';  titleOv.style.bottom = ''; titleOv.style.textAlign = 'right'; titleOv.style.right = '8%'; titleOv.style.left = ''; }
    else if (comp === 'אסימטרי') { titleOv.style.top = '8%';  titleOv.style.bottom = ''; titleOv.style.textAlign = 'right'; titleOv.style.right = '8%'; titleOv.style.left = ''; }
    else                          { titleOv.style.top = 'auto'; titleOv.style.bottom = '30px'; }
    face.appendChild(titleOv);

    const nameOv = document.createElement('div');
    nameOv.className = 'lib-html-name';
    nameOv.style.color = fg;
    nameOv.textContent = entry.name || '';
    face.appendChild(nameOv);

    div.addEventListener('click', () => openBookModal(entry));
    grid.appendChild(div);
  });

  applyLibTransform();
  startLibParallax();
}

function applyLibTransform() {
  const world = document.getElementById('library-world');
  if (world) world.style.transform = `translate(${libTX.toFixed(2)}px,${libTY.toFixed(2)}px) scale(${libZoom.toFixed(4)})`;
}

function startLibParallax() {
  const vp = document.getElementById('library-viewport');
  if (!vp) return;

  vp.onmousemove = e => {
    const r = vp.getBoundingClientRect();
    libTargetX = ((e.clientX - r.left) / r.width  - 0.5) * -32;
    libTargetY = ((e.clientY - r.top)  / r.height - 0.5) * -20;
  };
  vp.onmouseleave = () => { libTargetX = 0; libTargetY = 0; };
  vp.onwheel = e => {
    e.preventDefault();
    libZoom = Math.max(0.22, Math.min(2.4, libZoom - e.deltaY * 0.0012));
    applyLibTransform();
  };

  if (libRafId) cancelAnimationFrame(libRafId);
  (function tick() {
    libTX += (libTargetX - libTX) * 0.07;
    libTY += (libTargetY - libTY) * 0.07;
    applyLibTransform();
    libRafId = requestAnimationFrame(tick);
  })();
}

function openBookModal(entry) {
  const W = 180, H = 270;
  const bg     = entry.color?.colors?.[0] || '#111';
  const accent = entry.color?.colors?.[2] || null;
  const fg     = entry.color?.textColor   || '#fff';
  const imgSvg = entry.image?.svg         || null;
  const inner  = buildCoverSVG(W, H, bg, accent, imgSvg, entry.name,
                               entry.typography, fg, entry.composition,
                               getPalImgTint(entry.color), entry.bookTitle || '', entry.color?.nameColor);
  const spineCol = entry.color?.colors?.[1];
  const spineGrad = spineCol
    ? `linear-gradient(to right, color-mix(in srgb,${spineCol} 50%,#000) 0%, ${spineCol} 45%, color-mix(in srgb,${spineCol} 70%,#000) 100%)`
    : 'linear-gradient(to right, #080808 0%, #242424 55%, #111 100%)';
  document.getElementById('book-modal-cover').style.setProperty('--modal-spine', spineGrad);
  const face = document.getElementById('book-modal-face');
  face.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">${inner}</svg>`;

  // HTML overlays for correct font rendering
  face.querySelectorAll('text').forEach(t => (t.style.display = 'none'));
  const fontFamily = entry.typography ? entry.typography.family : "'Heebo', sans-serif";
  const comp = entry.composition ? entry.composition.key : '';

  let mTitle = face.querySelector('.modal-html-title');
  if (!mTitle) { mTitle = document.createElement('div'); mTitle.className = 'modal-html-title'; face.appendChild(mTitle); }
  mTitle.style.fontFamily = fontFamily;
  mTitle.style.color = fg;
  mTitle.textContent = entry.bookTitle || '';
  if (comp === 'מכסה הכל')     { mTitle.style.top = '8%';  mTitle.style.bottom = ''; mTitle.style.textAlign = 'center'; mTitle.style.right = ''; }
  else if (comp === 'חצוי')    { mTitle.style.top = '8%';  mTitle.style.bottom = ''; mTitle.style.textAlign = 'right'; mTitle.style.right = '8%'; }
  else if (comp === 'אסימטרי') { mTitle.style.top = '8%';  mTitle.style.bottom = ''; mTitle.style.textAlign = 'right'; mTitle.style.right = '8%'; }
  else                          { mTitle.style.top = 'auto'; mTitle.style.bottom = '48px'; mTitle.style.textAlign = 'center'; mTitle.style.right = ''; }

  let mName = face.querySelector('.modal-html-name');
  if (!mName) { mName = document.createElement('div'); mName.className = 'modal-html-name'; face.appendChild(mName); }
  mName.style.color = fg;
  mName.textContent = entry.name || '';
  const titleEl = document.getElementById('book-modal-title');
  if (titleEl) { titleEl.textContent = entry.bookTitle || ''; titleEl.style.display = entry.bookTitle ? '' : 'none'; }
  document.getElementById('book-modal-summary').textContent = entry.summary || '';
  document.getElementById('book-modal-name').textContent    = entry.name    || '';
  document.getElementById('book-modal').classList.add('open');
  document.addEventListener('keydown', _modalEsc);
}

function closeBookModal() {
  document.getElementById('book-modal').classList.remove('open');
  document.removeEventListener('keydown', _modalEsc);
}

function _modalEsc(e) { if (e.key === 'Escape') closeBookModal(); }

function stopLibParallax() {
  const vp = document.getElementById('library-viewport');
  if (vp) { vp.onmousemove = null; vp.onmouseleave = null; vp.onwheel = null; }
  if (libRafId) { cancelAnimationFrame(libRafId); libRafId = null; }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
localStorage.removeItem(LIBRARY_KEY);

go(1);
</script>
